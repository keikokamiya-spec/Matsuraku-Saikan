<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>松楽斎館 | Matsuraku-Saikan</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー / ナビゲーション -->
  <header class="site-header">
    <div class="container">
      <h1 class="logo"><a href="index.html">松楽斎館</a></h1>
      <nav class="global-nav">
        <ul>
          <li><a href="#about">About</a></li>
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="#access">Access</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ヒーローセクション -->
  <section class="hero">
    <div class="hero-inner">
      <h2 class="hero-title">松楽斎館</h2>
      <p class="hero-subtitle">Matsuraku-Saikan</p>
    </div>
  </section>

  <!-- Aboutセクション -->
  <section id="about" class="section about">
    <div class="container">
      <h2 class="section-title">About</h2>
      <p class="section-text">
        ここにお店・施設の紹介文を入力してください。
      </p>
    </div>
  </section>

  <!-- ギャラリーセクション -->
  <section id="gallery" class="section gallery">
    <div class="container">
      <h2 class="section-title">Gallery</h2>
      <div class="gallery-grid">
        <div class="gallery-item">
          <img src="img/DSC03240.webp" alt="Gallery 1">
        </div>
        <div class="gallery-item">
          <img src="img/DSC03241.webp" alt="Gallery 2">
        </div>
        <div class="gallery-item">
          <img src="img/DSC03245.webp" alt="Gallery 3">
        </div>
        <div class="gallery-item">
          <img src="img/DSC03246.webp" alt="Gallery 4">
        </div>
        <div class="gallery-item">
          <img src="img/DSC03250.webp" alt="Gallery 5">
        </div>
        <div class="gallery-item">
          <img src="img/DSC03253.webp" alt="Gallery 6">
        </div>
        <div class="gallery-item">
          <img src="img/DSC03262.webp" alt="Gallery 7">
        </div>
        <div class="gallery-item">
          <img src="img/DSC03268.webp" alt="Gallery 8">
        </div>
        <div class="gallery-item">
          <img src="img/DSC03272.webp" alt="Gallery 9">
        </div>
      </div>
    </div>
  </section>

  <!-- アクセスセクション -->
  <section id="access" class="section access">
    <div class="container">
      <h2 class="section-title">Access</h2>
      <div class="access-info">
        <dl class="info-list">
          <dt>住所</dt>
          <dd>〒000-0000 ○○県○○市○○町0-0-0</dd>
          <dt>電話</dt>
          <dd>000-000-0000</dd>
          <dt>営業時間</dt>
          <dd>00:00〜00:00</dd>
          <dt>定休日</dt>
          <dd>○曜日</dd>
        </dl>
      </div>
    </div>
  </section>

  <!-- お問い合わせセクション -->
  <section id="contact" class="section contact">
    <div class="container">
      <h2 class="section-title">Contact</h2>
      <form class="contact-form" action="#" method="post">
        <div class="form-group">
          <label for="name">お名前</label>
          <input type="text" id="name" name="name" placeholder="山田 太郎" required>
        </div>
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">メッセージ</label>
          <textarea id="message" name="message" rows="5" placeholder="メッセージを入力してください" required></textarea>
        </div>
        <button type="submit" class="btn-submit">送信する</button>
      </form>
    </div>
  </section>

  <!-- フッター -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 松楽斎館 Matsuraku-Saikan. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
